server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=secrets-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://secrets-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/secrets/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=TokenRelay

spring.cloud.gateway.server.webflux.routes[1].id=audit-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://audit-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/audit/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=TokenRelay

spring.cloud.gateway.server.webflux.routes[2].id=policy-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://policy-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/policies/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=TokenRelay

spring.cloud.gateway.server.webflux.routes[3].id=auth-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://auth-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=TokenRelay

spring.security.oauth2.client.provider.okta.issuer-uri=https://integrator-5119146.okta.com/oauth2/default
spring.security.oauth2.client.registration.okta.client-id=${OKTA_CLIENT_ID}
spring.security.oauth2.client.registration.okta.client-secret=${OKTA_CLIENT_SECRET}
spring.security.oauth2.client.registration.okta.scope=openid,profile,email

management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.tags.application=${spring.application.name}