services:
  toyota-postgres:
    image: postgres:15
    container_name: toyota-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: toyota_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toyota-network

  toyota-redis:
    image: redis:7
    container_name: toyota-redis
    ports:
      - "6379:6379"
    networks:
      - toyota-network

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - toyota-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      OKTA_CLIENT_ID: ${OKTA_CLIENT_ID}
      OKTA_CLIENT_SECRET: ${OKTA_CLIENT_SECRET}
    depends_on:
      - discovery-server
    networks:
      - toyota-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      DB_HOST: toyota-postgres
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      toyota-postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - toyota-network

  secrets-service:
    build: ./secrets-service
    container_name: secrets-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      DB_HOST: toyota-postgres
      DB_USER: postgres
      DB_PASSWORD: password
      SECRETS_AES_KEY: ${SECRETS_AES_KEY}
    depends_on:
      toyota-postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - toyota-network

  policy-service:
    build: ./policy-service
    container_name: policy-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      DB_HOST: toyota-postgres
      DB_USER: postgres
      DB_PASSWORD: password
    depends_on:
      toyota-postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - toyota-network

  audit-service:
    build: ./audit-service
    container_name: audit-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_URI: http://discovery-server:8761/eureka/
      DB_HOST: toyota-postgres
      DB_USER: postgres
      DB_PASSWORD: password
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      toyota-postgres:
        condition: service_healthy
      discovery-server:
        condition: service_started
    networks:
      - toyota-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - toyota-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - toyota-network

volumes:
  postgres-data:

networks:
  toyota-network:
    driver: bridge